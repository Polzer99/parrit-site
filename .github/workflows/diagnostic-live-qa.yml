name: Diagnostic live QA

on:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

jobs:
  diagnostic-live-qa:
    name: diagnostic LLM battery
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      DG_BASE: http://localhost:3210
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

      - name: start production server
        run: |
          npm run start -- -p 3210 > /tmp/parrit-site.log 2>&1 &
          echo $! > /tmp/parrit-site.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:3210/diagnostic >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/parrit-site.log
          exit 1

      - name: run diagnostic live QA
        run: node scripts/diagnostic-qa.mjs
