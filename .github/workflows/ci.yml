name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: lint and build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm run lint
        run: npm run lint

      - name: npm run qa:doctrine
        run: npm run qa:doctrine

      - name: npm run build
        run: npm run build

      - name: install Playwright browsers
        run: |
          npx playwright install --with-deps chromium
          python3 -m pip install --user playwright==1.60.0
          python3 -m playwright install chromium

      - name: start production server
        run: |
          npm run start -- -p 3210 > /tmp/parrit-site.log 2>&1 &
          echo $! > /tmp/parrit-site.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:3210/diagnostic >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/parrit-site.log
          exit 1

      - name: diagnostic Playwright gate
        env:
          QA_BASE_URL: http://localhost:3210
        run: npm run qa:diagnostic:e2e -- --browser=chromium

      - name: diagnostic contrast gate
        env:
          PARRIT_BASE: http://localhost:3210
        run: python3 scripts/contrast-audit.py /diagnostic
